<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Deals India</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}
header{
  background:linear-gradient(90deg,#ff5722,#ff9800);
  color:white;
  text-align:center;
  padding:20px;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:15px;
}
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
button{
  background:#ff5722;
  color:white;
  border:none;
  padding:8px;
  margin-top:10px;
  border-radius:5px;
  cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>🔥 Daily Deals India</h1>
<p>Best Offers & Discounts</p>
</header>

<div class="container" id="deals"></div>

<script>
// SIMPLE DEAL DATA
const deals = [
{
title:"Amazon Headphones Deal",
desc:"Up to 70% OFF on headphones",
link:"https://amazon.in"
},
{
title:"Flipkart Mobile Offer",
desc:"Smartphones starting ₹2999",
link:"https://flipkart.com"
},
{
title:"Myntra Fashion Sale",
desc:"Up to 80% OFF fashion",
link:"https://myntra.com"
}
];

// LOAD DEALS
const container = document.getElementById("deals");

deals.forEach(d=>{
const box = document.createElement("div");
box.className="card";

box.innerHTML=`
<h3>${d.title}</h3>
<p>${d.desc}</p>
<a href="${d.link}" target="_blank">
<button>Check Deal</button>
</a>
`;

container.appendChild(box);
});
</script>

</body>
</html>
